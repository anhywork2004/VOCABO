<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOCABO — Học tiếng Anh thông minh</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.png">
  <style>
    body { background: var(--gradient); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-container { width: 100%; max-width: 440px; padding: 20px; }
    .auth-card { background: #fff; border-radius: 24px; padding: 40px; box-shadow: 0 24px 64px rgba(0,0,0,.18); }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo .logo-icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: var(--gradient); display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 36px; margin-bottom: 12px;
    }
    .auth-logo h1 { font-size: 28px; color: var(--primary); }
    .auth-logo p  { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
    .tab-btns { display: flex; background: #f3f4f6; border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .tab-btn {
      flex: 1; padding: 10px; border: none; background: transparent;
      border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .2s; color: var(--text-muted);
    }
    .tab-btn.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #ccc; font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .btn-google {
      width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px;
      background: #fff; cursor: pointer; font-size: 14px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all .2s; color: var(--text);
    }
    .btn-google:hover { border-color: var(--primary); background: var(--primary-light); }
    .forgot-link { text-align: right; margin-top: -8px; margin-bottom: 16px; }
    .forgot-link a { font-size: 13px; color: var(--primary); text-decoration: none; }
    .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">📖</div>
        <h1>VOCABO</h1>
        <p>Học tiếng Anh thông minh với Flashcard</p>
      </div>

      <!-- Tabs -->
      <div class="tab-btns">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Đăng nhập</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Đăng ký</button>
      </div>

      <!-- Login Form -->
      <div id="form-login">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••">
        </div>
        <div class="forgot-link"><a href="#" onclick="showForgot()">Quên mật khẩu?</a></div>
        <div class="error-msg" id="login-error"></div>
        <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()">
          <span>Đăng nhập</span>
        </button>
      </div>

      <!-- Register Form -->
      <div id="form-register" class="hidden">
        <div class="form-group">
          <label class="form-label">Tên hiển thị</label>
          <input type="text" id="reg-name" class="form-control" placeholder="Tên của bạn">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="reg-email" class="form-control" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input type="password" id="reg-password" class="form-control" placeholder="Tối thiểu 6 ký tự">
        </div>
        <div class="error-msg" id="reg-error"></div>
        <button class="btn btn-primary btn-block btn-lg" onclick="doRegister()">
          <span>Tạo tài khoản</span>
        </button>
      </div>

      <div class="divider">hoặc</div>

      <button class="btn-google" onclick="doGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Tiếp tục với Google
      </button>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgot-modal" class="modal-overlay hidden">
    <div class="modal" style="max-width:380px">
      <div class="modal-title">🔑 Quên mật khẩu</div>
      <p class="text-muted text-sm mb-16">Nhập email để nhận link đặt lại mật khẩu</p>
      <div class="form-group">
        <input type="email" id="forgot-email" class="form-control" placeholder="email@example.com">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="hideForgot()">Hủy</button>
        <button class="btn btn-primary" onclick="doForgot()">Gửi email</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { loginWithEmail, registerWithEmail, loginWithGoogle, resetPassword, redirectIfLoggedIn } from "./js/auth.js";
    import { showToast, showLoading, hideLoading } from "./js/utils.js";

    redirectIfLoggedIn("dashboard.html");

    window.switchTab = (tab) => {
      document.getElementById("form-login").classList.toggle("hidden", tab !== "login");
      document.getElementById("form-register").classList.toggle("hidden", tab !== "register");
      document.getElementById("tab-login").classList.toggle("active", tab === "login");
      document.getElementById("tab-register").classList.toggle("active", tab === "register");
    };

    window.doLogin = async () => {
      const email    = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      const errEl    = document.getElementById("login-error");
      errEl.style.display = "none";
      if (!email || !password) { errEl.textContent = "Vui lòng nhập đầy đủ thông tin"; errEl.style.display = "block"; return; }
      showLoading();
      try {
        await loginWithEmail(email, password);
        window.location.href = "dashboard.html";
      } catch (e) {
        hideLoading();
        errEl.textContent = e.code === "auth/invalid-credential" ? "Email hoặc mật khẩu không đúng" : e.message;
        errEl.style.display = "block";
      }
    };

    window.doRegister = async () => {
      const name     = document.getElementById("reg-name").value.trim();
      const email    = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-password").value;
      const errEl    = document.getElementById("reg-error");
      errEl.style.display = "none";
      if (!name || !email || !password) { errEl.textContent = "Vui lòng nhập đầy đủ thông tin"; errEl.style.display = "block"; return; }
      showLoading();
      try {
        await registerWithEmail(email, password, name);
        window.location.href = "dashboard.html";
      } catch (e) {
        hideLoading();
        errEl.textContent = e.message;
        errEl.style.display = "block";
      }
    };

    window.doGoogle = async () => {
      showLoading();
      try {
        await loginWithGoogle();
        window.location.href = "dashboard.html";
      } catch (e) {
        hideLoading();
        showToast(e.message, "error");
      }
    };

    window.showForgot  = () => document.getElementById("forgot-modal").classList.remove("hidden");
    window.hideForgot  = () => document.getElementById("forgot-modal").classList.add("hidden");

    window.doForgot = async () => {
      const email = document.getElementById("forgot-email").value.trim();
      if (!email) return;
      try {
        await resetPassword(email);
        showToast("Đã gửi email đặt lại mật khẩu!", "success");
        hideForgot();
      } catch (e) {
        showToast(e.message, "error");
      }
    };

    // Enter key
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const tab = document.getElementById("tab-login").classList.contains("active");
        tab ? doLogin() : doRegister();
      }
    });
  </script>
</body>
</html>
